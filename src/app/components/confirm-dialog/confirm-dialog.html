<div class="backdrop" (click)="onCancel()">

  <div class="dialog">

    <h2>{{ title() }}</h2>

    <p>{{ message() }}</p>

    <div class="actions">

      <button class="cancel" (click)="onCancel()">
        Cancel
      </button>

      <button class="confirm" (click)="onConfirm()">
        Confirm
      </button>

    </div>

  </div>

</div>
